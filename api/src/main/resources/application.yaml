server:
  port: ${API_SERVER_PORT:8081}
  address: ${API_SERVER_ADDRESS:0.0.0.0}
spring:
  application:
    name: api
  client:
    wrapper:
      url: ${WRAPPER_ADDRESS:0.0.0.0}
      port: ${WRAPPER_PORT:8080}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:10}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:5}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: ${JPA_ONEN_IN_VIEW:false}
