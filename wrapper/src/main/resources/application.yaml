server:
  port: ${WRAPPER_SERVER_PORT:8080}
  address: ${WRAPPER_SERVER_ADDRESS:0.0.0.0}
spring:
  application:
    name: wrapper
  client:
    base-url: ${DIKIDI_BASE_URL:https://dikidi.net}
    auth-url: "https://auth.dikidi.net"
    connect-timeout: 10_000
    read-timeout: 20_000
resilience4j:
  ratelimiter:
    instances:
      dikidi:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 5s
